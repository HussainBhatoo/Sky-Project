{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Sky Engineering Portal</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
        }
        .logo-box {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .sub-brand {
            font-weight: 600;
            color: var(--sky-header-blue);
            opacity: 0.8;
            margin-top: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="login-container animate-slide-up">
        <div class="logo-box">
            <img src="{% static 'images/Sky-spectrum-rgb.png' %}" alt="Sky Logo" class="sky-logo-img" style="max-width: 200px; margin-bottom: 0.5rem;">
            <p class="sub-brand">Security Recovery</p>
        </div>

        <div class="glass-card" style="background: rgba(255, 255, 255, 0.95); box-shadow: 0 30px 60px rgba(0,0,0,0.08); padding: 2.5rem; border-radius: 24px;">
            <h2 class="mb-2 spectrum-text" style="font-size: 1.5rem; font-weight: 800; text-align: center;">Reset Your Password</h2>
            <p style="color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 2rem;">
                Enter your official Sky email address, and we'll send you a secure recovery link.
            </p>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_email">Sky Email Address</label>
                    <input type="email" name="email" id="id_email" class="form-control" placeholder="username@sky.uk" required>
                </div>

                <div class="mt-2 text-center">
                    <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 12px; padding: 1rem;">Send Recovery Link</button>
                    <a href="{% url 'login' %}" style="display: block; margin-top: 1.5rem; font-size: 0.85rem; color: #888; text-decoration: none; font-weight: 600;">Return to Login</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
