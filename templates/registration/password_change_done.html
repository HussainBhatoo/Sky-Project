{% extends 'base.html' %}
{% load static %}

{% block title %}Password Updated | Sky Engineering Registry{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 5rem auto; text-align: center;" class="animate-slide-up">
    <div class="card shadow-lg" style="padding: 3rem; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 2rem;">
        <div style="width: 80px; height: 80px; background: rgba(0, 158, 73, 0.1); color: #009E49; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem auto;">
            <i class='bx bx-check-double' style="font-size: 3rem;"></i>
        </div>
        
        <h2 style="color: var(--sky-header-blue); font-weight: 800; margin-bottom: 1rem; letter-spacing: -0.01em;">Security Updated</h2>
        <p style="color: var(--muted-foreground); margin-bottom: 2.5rem; line-height: 1.6; font-weight: 500;">
            Your credentials have been successfully rotated. Your account is now secured with your new password.
        </p>
        
        <a href="{% url 'core:profile' %}" class="btn btn-primary" style="width: 100%; border-radius: 1rem; font-weight: 700; padding: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <i class='bx bx-user'></i> Back to Profile
        </a>
    </div>
</div>
{% endblock %}
