{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Complete | Sky Engineering Portal</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
        }
        .logo-box {
            text-align: center;
            margin-bottom: 2.5rem;
        }
    </style>
</head>
<body>

    <div class="login-container animate-slide-up">
        <div class="logo-box">
            <img src="{% static 'images/Sky-spectrum-rgb.png' %}" alt="Sky Logo" class="sky-logo-img" style="max-width: 200px; margin-bottom: 0.5rem;">
        </div>

        <div class="glass-card" style="background: rgba(255, 255, 255, 0.95); box-shadow: 0 30px 60px rgba(0,0,0,0.08); padding: 3rem 2rem; border-radius: 24px; text-align: center;">
            <div style="background: rgba(38, 191, 107, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class='bx bx-check-shield' style="font-size: 2rem; color: #26bf6b;"></i>
            </div>
            <h2 class="mb-1 spectrum-text" style="font-size: 1.5rem; font-weight: 800;">Password Updated</h2>
            <p style="color: #666; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">
                Your security password has been successfully reset. You can now access the Engineering Registry using your new credentials.
            </p>
            <a href="{% url 'login' %}" class="btn btn-primary" style="display: inline-block; width: 100%; border-radius: 12px; padding: 1rem; text-decoration: none;">Sign In Now</a>
        </div>
    </div>

</body>
</html>
