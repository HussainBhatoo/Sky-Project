{% load static %}
<!-- 
  SKY ENGINEERING TEAM REGISTRY - BASE ARCHITECTURE
  
  LAYOUT STRUCTURE:
  - .app-container: Global flex wrapper
  - .sidebar: Left-side navigation with spectral branding
  - .main-wrapper: Right-side content area
  - .top-navbar: Floating glassmorphic utility bar
  - .content-area: Main page-level container with entry animations
  
  DESIGN SYSTEM:
  - Custom CSS/JS implementation based on the Sky brand color palette.
  
  LEAD DEVELOPER: Maurya Patel
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sky Engineering Registry{% endblock %}</title>
    
    <!-- Global Design System (Vanilla High-Fi) -->
    <link rel="stylesheet" href="{% static 'css/sky-layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <!-- Core Iconography (Boxicons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Sidebar toggle moved to top-navbar left zone -->

    <div class="app-container">
        <!-- Sidebar Navigation: Shared Partial -->
        {% include "partials/_sidebar.html" %}

        <div class="main-wrapper">
            <!-- Top Utility Navbar: Shared Partial -->
            {% include "partials/_top_navbar.html" %}


            <!-- Dynamic Content Injection Point -->
            <main class="content-area animate-slide-up">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- High-Fi Core Logic Subsystem (Vanilla JS) -->
    <script src="{% static 'js/app.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
