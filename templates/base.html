{% load static %}
<!-- 
  SKY ENGINEERING TEAM REGISTRY - BASE ARCHITECTURE
  
  LAYOUT STRUCTURE:
  - .app-container: Global flex wrapper
  - .sidebar: Left-side navigation with spectral branding
  - .main-wrapper: Right-side content area
  - .top-navbar: Floating glassmorphic utility bar
  - .content-area: Main page-level container with entry animations
  
  DESIGN SYSTEM:
  - Vanilla CSS/JS implementation of the "High-Fidelity" Sky Spectrum theme.
  - Zero Tailwind runtime dependency.
  
  LEAD DEVELOPER: Maurya Patel
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sky Engineering Registry{% endblock %}</title>
    
    <!-- Global Design System (Vanilla High-Fi) -->
    <link rel="stylesheet" href="{% static 'css/sky-layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <!-- Core Iconography (Boxicons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Sidebar toggle moved to top-navbar left zone -->

    <div class="app-container">
        <!-- Sidebar Navigation: Shared Partial -->
        {% include "partials/_sidebar.html" %}

        <div class="main-wrapper">
            <!-- Top Utility Navbar: Shared Partial -->
            {% include "partials/_top_navbar.html" %}


            <!-- Dynamic Content Injection Point -->
            <main class="content-area animate-slide-up">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- High-Fi Core Logic Subsystem (Vanilla JS) -->
    <script>
        /**
         * GLOBAL UI ARCHITECTURE CONTROLLER
         * Implements High-Fidelity interaction patterns from User Inquiry reference.
         */
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-input');
            const resultsDropdown = document.getElementById('search-results');
            
            // Real High-Fi Dynamic Search Logic
            if (searchInput) {
                let debounceTimer;
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.trim();
                    clearTimeout(debounceTimer);

                    if (query.length > 1) {
                        debounceTimer = setTimeout(() => {
                            fetch(`/search/?q=${encodeURIComponent(query)}`)
                                .then(response => response.json())
                                .then(data => {
                                    if (data.results && data.results.length > 0) {
                                        resultsDropdown.innerHTML = `
                                            <div class="search-result-header">RESULTS FOR: "${query}"</div>
                                            ${data.results.map(item => `
                                                <a href="${item.url}" class="search-result-item" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease;">
                                                    <i class='bx ${item.icon}' style="color: var(--sky-primary); font-size: 1.2rem;"></i>
                                                    <div style="flex: 1; min-width: 0;">
                                                        <div style="font-weight: 600; font-size: 0.9rem; color: var(--sky-header-blue); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.title}</div>
                                                        <div style="font-size: 0.7rem; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.5px;">${item.category}</div>
                                                    </div>
                                                </a>
                                            `).join('')}
                                        `;
                                        resultsDropdown.classList.add('is-active');
                                    } else {
                                        resultsDropdown.innerHTML = `
                                            <div class="search-result-header">NO RESULTS FOR: "${query}"</div>
                                            <div class="search-result-item" style="opacity: 0.6; pointer-events: none;">
                                                <i class='bx bx-info-circle'></i>
                                                <span>Try specific team names or departments.</span>
                                            </div>
                                        `;
                                        resultsDropdown.classList.add('is-active');
                                    }
                                })
                                .catch(err => {
                                    console.error("Search Fail:", err);
                                });
                        }, 300); // 300ms debounce
                    } else {
                        resultsDropdown.classList.remove('is-active');
                        resultsDropdown.innerHTML = '';
                    }
                });

                // Clear search and close on focus out
                document.addEventListener('click', (e) => {
                    if (!document.getElementById('global-search').contains(e.target)) {
                        resultsDropdown.classList.remove('is-active');
                    }
                });
            }

            //  Sidebar Toggle Logic
            const sidebarToggle = document.getElementById('sidebar-toggle');
            if (sidebarToggle) {
                // Initialize from localStorage
                if (localStorage.getItem('sidebar-collapsed') === 'true') {
                    document.body.classList.add('sidebar-collapsed');
                }
                
                sidebarToggle.addEventListener('click', () => {
                    document.body.classList.toggle('sidebar-collapsed');
                    localStorage.setItem('sidebar-collapsed', document.body.classList.contains('sidebar-collapsed'));
                });
            }

            // User Dropdown Logic
            const dropdownBtn = document.getElementById('user-dropdown-btn');
            const dropdownMenu = document.getElementById('user-dropdown-menu');
            const dropdownContainer = document.getElementById('user-dropdown-container');
            
            if (dropdownBtn && dropdownMenu) {
                dropdownBtn.addEventListener('click', (e) => {
                    dropdownMenu.classList.toggle('active');
                });
                
                document.addEventListener('click', (e) => {
                    if (dropdownContainer && !dropdownContainer.contains(e.target)) {
                        dropdownMenu.classList.remove('active');
                    }
                });
            }

            console.log("Sky Engineering High-Fi Core Ready | Lead: Maurya Patel");
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
