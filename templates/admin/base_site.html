{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Sky Admin{% endblock %}

{% block extrahead %}
    {{ block.super }}
    <!-- 🧬 Inject High-Fidelity Design System -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* 🎨 Custom Admin Overrides to Match Registry Design */
        #header {
            background: var(--sky-header-blue);
            background: var(--sky-spectrum-diagonal);
            border-bottom: 4px solid white;
            padding: 1rem 2rem;
        }
        #branding h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white !important;
        }
        .module h2, .module caption, .inline-group h2 {
            background: var(--sky-header-blue);
            color: white;
            border-radius: 8px 8px 0 0;
            padding: 10px 15px;
        }
        #content h1 {
            color: var(--sky-header-blue);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        div.breadcrumbs {
            background: var(--sky-surface-strong);
            border-bottom: 1px solid var(--border);
            padding: 10px 2rem;
            color: var(--sky-header-blue);
        }
        .button, input[type=submit], input[type=button], .submit-row input, a.button {
            background: var(--sky-primary) !important;
            border-radius: 8px !important;
            padding: 10px 20px !important;
            font-weight: 700 !important;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0, 15, 245, 0.2) !important;
        }
        .button:hover { background: var(--sky-primary-dark) !important; }
        
        /* User Tools (Top Right) */
        #user-tools {
            color: white;
            font-weight: 600;
        }
        #user-tools a { color: white !important; border-bottom: 1px solid rgba(255,255,255,0.3); }

        /* Return to Hub Branding */
        .return-hub {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
            text-decoration: none;
            margin-right: 15px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .return-hub:hover {
            background: white;
            color: var(--sky-primary);
        }
    </style>
{% endblock %}

{% block branding %}
<div id="branding">
    <a href="{% url 'core:dashboard' %}" class="return-hub">
        <i class='bx bx-left-arrow-alt'></i> Return to Sky Hub
    </a>
    <h1 id="site-name">
        <img src="{% static 'images/Sky-spectrum-rgb.png' %}" alt="Sky" style="height: 30px; vertical-align: middle; filter: brightness(0) invert(1); margin-right: 10px;">
        Engineering Registry Administration
    </h1>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
