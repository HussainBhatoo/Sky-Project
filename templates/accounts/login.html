<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sky Engineering Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #e0e4ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 245, 0.1);
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-out;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .sky-brand {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #eee;
            border-radius: var(--border-radius);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .login-btn:hover {
            background: var(--primary-dark);
        }
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="sky-brand">sky</div>
            <h2 style="font-weight: 600;">Engineering Team Registry</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Group H Implementation (The Avengers)</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username or Email</label>
                <input type="text" name="username" id="id_username" placeholder="e.g. maurya_patel" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn shadow-md">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="#">Request Access</a></p>
            <p style="margin-top: 1rem;"><a href="#" style="font-size: 0.85rem; font-weight: 400; opacity: 0.8;">Forgot Password?</a></p>
        </div>
    </div>
</body>
</html>
